name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: docker
    container: node:lts-alpine3.23@sha256:7c078d435026a97c8ff97b00d70e2f6ec6298a440e25a9485a9af414d5d37009
    steps:
      - name: Install Deps
        run: |
          apk add \
            git \
            jq \
            curl

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install app
        run: npm ci

      ## PRETTIER
      - name: Run Prettier
        id: prettier_check
        continue-on-error: true
        run: npm run format:check

      - name: Fix formatting
        if: steps.prettier_check.outcome == 'failure'
        run: |
          npm run format
          git diff > prettier.patch
          git reset HEAD --hard

      - name: Upload Prettier patch
        if: steps.prettier_check.outcome == 'failure'
        uses: https://data.forgejo.org/forgejo/upload-artifact@v5
        with:
          name: prettier-patch
          path: prettier.patch

      ## ES-LINT
      - name: EsLint
        id: eslint_check
        continue-on-error: true
        run: npm run lint

      - name: Fix ESLint
        if: steps.eslint_check.outcome == 'failure'
        continue-on-error: true
        run: npm run lint:fix:dry-run

      - name: Upload ESLint errors
        if: steps.eslint_check.outcome == 'failure'
        uses: https://data.forgejo.org/forgejo/upload-artifact@v5
        with:
          name: lint-fix
          path: lint-fix.json

      ## SVELTE CHECK
      - name: Run Svelte check
        id: svelte_check
        continue-on-error: true
        run: npm run check

      # Force failed
      - name: Fail if checks failed
        if: |
          steps.prettier_check.outcome == 'failure' ||
          steps.eslint_check.outcome == 'failure' ||
          steps.svelte_check.outcome == 'failure'
        run: |
          echo "Quality checks failed"
          exit 1
