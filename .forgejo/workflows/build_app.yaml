name: Docker Build

on:
  push:
    branches:
      - "main"
      - "develop"
      - "release/*"

env:
  IS_MAIN: ${{ github.ref == 'refs/heads/main' }}

jobs:
  gitversion:
    name: Gitversion
    runs-on: docker
    container: gittools/gitversion:6.7.0-alpine.3.23-10.0
    outputs:
      version: ${{ steps.version.outputs.version }}
      majorMinorPatch: ${{ steps.version.outputs.majorMinorPatch }}
      preReleaseLabel: ${{ steps.version.outputs.preReleaseLabel }}
    steps:
      - name: Install deps
        run: |
          apk add --no-cache \
            jq

      - name: Checkout
        run: |
          set -eu
          cd "$FORGEJO_WORKSPACE"

          git init
          git remote add origin "${FORGEJO_SERVER_URL}/${FORGEJO_REPOSITORY}.git"

          git -c credential.helper='!f() {
            echo username=forgejo-actions
            echo password=${FORGEJO_TOKEN}
          }; f' fetch --tags --force --prune origin

          git checkout --detach "$FORGEJO_SHA"

      - name: Get Version
        id: version
        run: |
          GITVERSION_OUTPUT=$(/tools/dotnet-gitversion /output json)
          echo "version=$(echo $GITVERSION_OUTPUT | jq -r '.SemVer')" >> "$FORGEJO_OUTPUT"
          echo "majorMinorPatch=$(echo $GITVERSION_OUTPUT | jq -r '.MajorMinorPatch')" >> "$FORGEJO_OUTPUT"
          echo "preReleaseLabel=$(echo $GITVERSION_OUTPUT | jq -r '.PreReleaseLabel')" >> "$FORGEJO_OUTPUT"

      - name: Display Version
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"

  build-image:
    name: Build image
    runs-on: docker
    container:
      image: docker:29-cli
    needs:
      - gitversion
    env:
      CODEBERG_URL: "codeberg.org"
      REPO_URL: "codeberg.org/huskas-2189/bookmark"
      IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Is main branch ?
        run: |
          [ "$IS_MAIN" = "true" ] && echo "is main branch" || echo "is not main branch"
      - name: Install Deps
        run: |
          apk add --no-cache \
            git \
            ca-certificates \
            jq

      - name: Set Up Git
        run: |
          git config --global user.name "${FORGEJO_ACTOR}"
          git config --global user.email "bookmark-pipeline@no-reply"

      - name: Setup Version
        run: |
          if [ "$IS_MAIN" = "true" ]; then
            VERSION="${{ needs.gitversion.outputs.version }}"
          else
            VERSION="${{ needs.gitversion.outputs.majorMinorPatch }}-${{ needs.gitversion.outputs.preReleaseLabel }}"
          fi

          echo $VERSION
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Checkout
        run: |
          set -eu
          cd "$FORGEJO_WORKSPACE"

          LOGGED_REPO_URL="https://${FORGEJO_ACTOR}:${FORGEJO_TOKEN}@${REPO_URL}.git"

          git init
          git remote add origin "${LOGGED_REPO_URL}"

          git -c credential.helper='!f() {
            echo username=forgejo-actions
            echo password=${FORGEJO_TOKEN}
          }; f' fetch --tags --force --prune origin

          git checkout --detach "$FORGEJO_SHA"

      #      - name: Tag
      #        run: |
      #          git tag ${{ needs.gitversion.outputs.version }}
      #          git push --tags

      - name: Login registry
        run: |
          echo ${{ secrets.REGISTRY_TOKEN }} | docker login ${CODEBERG_URL} \
            --username "${FORGEJO_ACTOR}" \
            --password-stdin

      - name: Build Image
        run: |
          docker build --no-cache -t bookmark_tmp \
            --build-arg VERSION=${VERSION} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            .

      - name: Tag images
        run: |
          [ "$IS_MAIN" = "true" ] \
            && docker image tag bookmark_tmp ${REPO_URL}:latest
          docker image tag bookmark_tmp ${REPO_URL}:${VERSION}

      - name: Push Image to registry
        run: |
          docker image push --all-tags ${REPO_URL}

      - name: Clean up
        run: |
          docker rmi ${REPO_URL}:${VERSION}
          [ "$IS_MAIN" = "true" ] && docker rmi ${REPO_URL}:latest
          docker rmi bookmark_tmp
          docker logout ${CODEBERG_URL}

  publish-release:
    name: Publish Release
    runs-on: docker
    container:
      image: node:lts
    needs:
      - gitversion
      - build-image
    env:
      GIT_CLIFF_VERSION: "2.13.1"
      CHANGELOG_FILE: "CHANGELOG.md"
    steps:
      - name: Install Deps
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git \
            jq \
            curl

      - name: Setup Version
        run: |
          if [ "$IS_MAIN" = "true" ]; then
            VERSION="${{ needs.gitversion.outputs.version }}"
          else
            VERSION="${{ needs.gitversion.outputs.majorMinorPatch }}-${{ needs.gitversion.outputs.preReleaseLabel }}"
          fi

          echo $VERSION
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          wget "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xvzf git-cliff-*.tar.gz
          mv git-cliff-${GIT_CLIFF_VERSION}/git-cliff .
          ./git-cliff --init

      - name: Generate pre-release changelog
        if: env.IS_MAIN != 'true'
        run: |
          ./git-cliff \
            --tag "${VERSION}" \
            --ignore-tags='^.*$' \
            -o ${CHANGELOG_FILE} \
            --config ./.forgejo/cliff-prerelease.toml \
            origin/main..HEAD

      - name: Generate release changelog
        if: env.IS_MAIN == 'true'
        run: |
          ./git-cliff \
            --tag "${VERSION}" \
            --topo-order \
            --use-branch-tags \
            --tag-pattern '^[0-9]*\.[0-9]*\.[0-9]$' \
            --unreleased \
            --config ./.forgejo/cliff-release.toml \
            -o ${CHANGELOG_FILE}

      - name: Create Release
        uses: https://data.forgejo.org/actions/forgejo-release@v2.12.1
        with:
          tag: "${{ env.VERSION }}"
          token: "${{ secrets.BOOKMARK_BOT_TOKEN }}"
          override: ${{ env.IS_MAIN != 'true' }}
          direction: upload
          prerelease: ${{ env.IS_MAIN != 'true' }}
          skip-assets: true
          release-notes-file: "${{ env.CHANGELOG_FILE }}"
